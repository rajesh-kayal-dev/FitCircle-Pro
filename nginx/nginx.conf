# ─────────────────────────────────────────────────────────────────
# FitCircle Pro — Production Nginx Reverse Proxy
# ─────────────────────────────────────────────────────────────────

# Rate limiting zones (applied to /api/ routes)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

server {
    listen 80;
    server_name _;

    # ── Security Headers ───────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"           always;
    add_header X-Content-Type-Options    "nosniff"              always;
    add_header X-XSS-Protection          "1; mode=block"        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=()" always;

    # ── Gzip Compression ───────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Health Check passthrough (Docker / uptime monitors) ───
    location = /health {
        proxy_pass         http://backend:5000/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── Backend API ────────────────────────────────────────────
    location /api/ {
        # Rate limiting: burst allows short spikes, nodelay = no queue
        limit_req zone=api_limit burst=60 nodelay;

        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support (for chat-service)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;

        # Hide internal server info from clients
        proxy_hide_header X-Powered-By;
    }

    # ── Frontend (SPA fallback) ────────────────────────────────
    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 30s;
    }

    # ── Block hidden files (.env, .git, etc.) ─────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
