services:
  # ── MongoDB ──────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: fitcircle-mongodb
    volumes:
      - mongodb_data:/data/db
    networks:
      - fitcircle-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Backend (Gateway + All Microservices) ────────────────────
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: fitcircle-backend
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      AUTH_SERVICE: http://localhost:5001
      USER_SERVICE: http://localhost:5002
      USER_SERVICE_URL: http://localhost:5002
      FEED_SERVICE: http://localhost:5003
      STORE_SERVICE: http://localhost:5004
      WORKOUT_SERVICE: http://localhost:5005
      DIET_SERVICE: http://localhost:5006
      CHAT_SERVICE: http://localhost:5007
      NODE_ENV: development
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - fitcircle-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ── Frontend (React + Nginx) ──────────────────────────────────
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: fitcircle-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fitcircle-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mongodb_data:
    driver: local

networks:
  fitcircle-net:
    driver: bridge
